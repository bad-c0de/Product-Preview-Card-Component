<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Preview Card Component</title>
  <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="product-container">
      <div class="product-image">
        <img src="images/image-product-mobile.jpg" alt="Perfume Product Image" class="mobile-img">
        <img src="images/image-product-desktop.jpg" alt="Perfume Product Image" class="desktop-img">
      </div>

      <div class="product-text-area">
        <p class="product-type">P E R F U M E</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p>
          A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="prices">
          <p class="new-price">$149.99</p>
          <s class="old-price">$169.99</s>
        </div>

        <button type="submit" class="add-btn"><img src="images/icon-cart.svg" alt="Cart Icon"> Add to Cart</button>
      </div>
    </section>
  </main>
</body>
</html>
